<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Decentralized Tamper-Resistant Civic Issue Reporting System</title>
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>Decentralized Tamper-Resistant Civic Issue Reporting System</h1>

      <section class="card">
        <div class="top-actions">
          <h2>Dashboard</h2>
          <a class="action-link" href="/report">Report an Issue</a>
        </div>
      </section>

      <section class="card">
        <h2>Reported Issues</h2>
        <p id="message"></p>
        <div id="issue-list" class="issue-list"></div>
        <div class="verify-all-wrap">
          <button id="verify-all-btn" class="verify-all-btn">Verify All</button>
          <div id="verify-all-result" class="verify-all-result"></div>
        </div>
      </section>
    </main>

    <script src="/assets/dashboard.js"></script>
  </body>
</html>
